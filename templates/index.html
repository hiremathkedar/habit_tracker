<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Habit Tracker – Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-950 text-slate-100">
  <main class="max-w-4xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-semibold mb-4">Today</h1>
    <div class="grid gap-4">
      <div class="card rounded-2xl p-4">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full" style="background:#3b82f6"></div>
            <div class="font-medium">WALKING</div>
            <span class="text-xs opacity-60">Streak: 0🔥</span>
          </div>
          <button class="px-3 py-1.5 rounded-lg text-sm border border-white/10 bg-slate-800">Mark done</button>
        </div>
        <div class="mt-3 text-xs opacity-80">This week</div>
        <div class="mt-2 grid grid-cols-7 gap-2">
          <button class="h-8 rounded-lg border border-white/10 text-xs bg-slate-800">M</button>
          <button class="h-8 rounded-lg border border-white/10 text-xs bg-slate-800">T</button>
          <button class="h-8 rounded-lg border border-white/10 text-xs bg-slate-800">W</button>
          <button class="h-8 rounded-lg border border-white/10 text-xs bg-slate-800">T</button>
          <button class="h-8 rounded-lg border border-white/10 text-xs bg-slate-800">F</button>
          <button class="h-8 rounded-lg border border-white/10 text-xs bg-slate-800">S</button>
          <button class="h-8 rounded-lg border border-white/10 text-xs bg-slate-800">S</button>
        </div>
      </div>
    </div>
    <h2 class="text-xl font-semibold mt-8 mb-2">Weekly Check-ins</h2>
    <canvas id="chart" height="120"></canvas>
  </main>
  <script>
    const labels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const data = [1, 2, 0, 1, 0, 0, 1];
    new Chart(document.getElementById('chart'), {
      type: 'bar',
      data: { labels, datasets: [{ label: 'Check-ins', data }]},
      options: { scales: { y: { beginAtZero: true, precision: 0 } } }
    });
  </script>
</body>
</html>
